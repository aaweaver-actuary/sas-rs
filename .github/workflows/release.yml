name: Release Snapshots

on:
  workflow_run:
    workflows:
      - Rust CI
    types:
      - completed

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release-artifacts:
    name: build ${{ matrix.target }}
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (
          github.event.workflow_run.head_branch == 'master' ||
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: sasrs-x86_64-unknown-linux-gnu.tar.gz
            binary: sasrs
          - os: macos-13
            target: x86_64-apple-darwin
            archive: sasrs-x86_64-apple-darwin.tar.gz
            binary: sasrs
          - os: macos-14
            target: aarch64-apple-darwin
            archive: sasrs-aarch64-apple-darwin.tar.gz
            binary: sasrs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: sasrs-x86_64-pc-windows-msvc.zip
            binary: sasrs.exe
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin sasrs --target ${{ matrix.target }}

      - name: Archive Unix binary
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    name: publish snapshot release
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (
          github.event.workflow_run.head_branch == 'master' ||
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Derive release metadata
        id: release_meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          safe_branch="${HEAD_BRANCH//\//-}"
          short_sha="${HEAD_SHA::12}"
          echo "tag=${safe_branch}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=${safe_branch} snapshot ${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          prerelease: true
          generate_release_notes: true
          files: dist/*
          body: |
            Automated multi-platform snapshot release for `${{ github.event.workflow_run.head_branch }}` at `${{ github.event.workflow_run.head_sha }}`.
